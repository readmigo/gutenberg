name: Daily Enrich

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum books to enrich'
        required: false
        default: '50'

jobs:
  enrich:
    name: AI Enrich Books
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Trigger AI enrichment on Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: readmigo
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 55m
          script: |
            cd /home/readmigo/projects/gutenberg && git checkout -- . && git pull --ff-only
            cd scripts && pnpm install --no-frozen-lockfile 2>/dev/null || true
            npx ts-node pg-enrich.ts --limit=${{ github.event.inputs.limit || '50' }} 2>&1 | tee -a /tmp/pg-enrich-$(date +%Y%m%d).log
