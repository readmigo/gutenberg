name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check worker
        run: pnpm --filter worker tsc --noEmit

      - name: Type check scripts
        run: pnpm --filter scripts tsc --noEmit

      - name: Cache test fixtures
        id: cache-fixtures
        uses: actions/cache@v4
        with:
          path: scripts/tests/fixtures
          key: gutenberg-test-fixtures-v1

      - name: Download test fixtures
        if: steps.cache-fixtures.outputs.cache-hit != 'true'
        run: bash scripts/tests/download-fixtures.sh

      - name: Run pipeline tests
        run: pnpm --filter scripts test
